.form-range::-moz-range-track {
  height: 28px;

}

.form-range::-moz-range-thumb {
  width: 20px;
  height: 20px;

  border-radius: var(--radius-full);
  background: light-dark(var(--primary-foreground), var(--foreground));
}

  border-color: var(--ring);
  box-shadow: inset 0 0 0 1px var(--ring);
}

.form-range:disabled {
  cursor: not-allowed;
  opacity: 0.4;
}

.btn:not(.btn-primary, .viz-tile):is(

  background: var(--primary);
}

.btn.viz-tile:is([aria-pressed=&quot;true&quot;], [aria-selected=&quot;true&quot;], .is-selected) {
  border-color: var(--primary);
  box-shadow: inset 0 0 0 1px var(--primary);
}

.btn:focus-visible {
  outline: 2px solid var(--ring);
  outline-offset: 2px;
}

svg {
  display: block;
  max-width: 100%;
  height: auto;
}

#widget &gt; svg {
  width: 100%;
}

.text-warning,
.text-destructive {
  color: var(--destructive);
}

ing:11px;min-height:142px}.stage b{display:block;color:#bda9ff;font-size:16px;margin-bottom:6px}.stage.http b{color:#82b2ff}.stage.r1{border-color:#7b603d}.stage ul{margin:0;padding-left:16px;color:#b7c3db;font-size:11px;line-height:1.45}.foot{margin-top:15px;padding-top:12px;border-top:1px solid #2a3652;color:#91a0bc;font-size:11px;display:flex;justify-content:space-between}.clip{fill:#f5b95f}.axisbreak{stroke:#f5b95f;stroke-width:3}.badge{display:inline-block;border-radius:999px;background:#17372f;color:#5ce1ac;padding:3px 9px;font-weight:700}.svgbox{width:100%;height:auto;display:block;margin-top:7px}

        &lt;text x=&quot;25&quot; y=&quot;402&quot; class=&quot;tick&quot;&gt;0.0&lt;/text&gt;&lt;text x=&quot;25&quot; y=&quot;333&quot; class=&quot;tick&quot;&gt;0.2&lt;/text&gt;&lt;text x=&quot;25&quot; y=&quot;264&quot; class=&quot;tick&quot;&gt;0.4&lt;/text&gt;&lt;text x=&quot;25&quot; y=&quot;196&quot; class=&quot;tick&quot;&gt;0.6&lt;/text&gt;&lt;text x=&quot;25&quot; y=&quot;127&quot; class=&quot;tick&quot;&gt;0.8&lt;/text&gt;&lt;text x=&quot;25&quot; y=&quot;58&quot; class=&quot;tick&quot;&gt;1.0&lt;/text&gt;

        &lt;g&gt;&lt;rect x=&quot;302&quot; y=&quot;273&quot; width=&quot;31&quot; height=&quot;125&quot; rx=&quot;4&quot; class=&quot;bar50&quot;/&gt;&lt;rect x=&quot;336&quot; y=&quot;216&quot; width=&quot;31&quot; height=&quot;182&quot; rx=&quot;4&quot; class=&quot;bar95&quot;/&gt;&lt;text x=&quot;317&quot; y=&quot;267&quot; text-anchor=&quot;middle&quot; class=&quot;value50&quot;&gt;.3632&lt;/text&gt;&lt;text x=&quot;351&quot; y=&quot;210&quot; text-anchor=&quot;middle&quot; class=&quot;value95&quot;&gt;.5285&lt;/text&gt;&lt;text x=&quot;334&quot; y=&quot;421&quot; text-anchor=&quot;middle&quot; class=&quot;label&quot;&gt;R4&lt;/text&gt;&lt;/g&gt;

      &lt;div class=&quot;note warn&quot;&gt;&lt;b&gt;Read the history correctly:&lt;/b&gt; releases add correctness, authentication, recovery and operational controls, so latency is not expected to fall monotonically. R6 recovers performance with binary schema v2 and lower DB-MemBus-owned allocation/copy overhead while retaining R3-R5 guarantees.&lt;/div&gt;

  &lt;div class=&quot;timeline&quot;&gt;
    &lt;h2&gt;What each revision added&lt;/h2&gt;
    &lt;div class=&quot;stages&quot;&gt;
      &lt;div class=&quot;stage&quot;&gt;&lt;b&gt;R6 · Superoptimization&lt;/b&gt;&lt;ul&gt;&lt;li&gt;binary operation schema v2&lt;/li&gt;&lt;li&gt;compact route request v3&lt;/li&gt;&lt;li&gt;reused producer buffers&lt;/li&gt;&lt;li&gt;single-owned receive payload&lt;/li&gt;&lt;li&gt;lower-observer-effect profiler&lt;/li&gt;&lt;/ul&gt;&lt;/div&gt;
      &lt;div class=&quot;stage&quot;&gt;&lt;b&gt;R5 · Product foundations&lt;/b&gt;&lt;ul&gt;&lt;li&gt;fanout / many-to-one APIs&lt;/li&gt;&lt;li&gt;route quotas and rate limits&lt;/li&gt;&lt;li&gt;diagnostic snapshots&lt;/li&gt;&lt;li&gt;key rotation and shutdown state&lt;/li&gt;&lt;li&gt;service-mode groundwork&lt;/li&gt;&lt;/ul&gt;&lt;/div&gt;
      &lt;div class=&quot;stage&quot;&gt;&lt;b&gt;R4 · Recovery + bounds&lt;/b&gt;&lt;ul&gt;&lt;li&gt;bounded uncertain tombstones&lt;/li&gt;&lt;li&gt;attempt correlation&lt;/li&gt;&lt;li&gt;reconciliation lane&lt;/li&gt;&lt;li&gt;payload max / max+1 proof&lt;/li&gt;&lt;li&gt;restart and crash boundaries&lt;/li&gt;&lt;/ul&gt;&lt;/div&gt;
      &lt;div class=&quot;stage&quot;&gt;&lt;b&gt;R3 · Authenticated routes&lt;/b&gt;&lt;ul&gt;&lt;li&gt;authenticated Frame v2&lt;/li&gt;&lt;li&gt;current-user principal checks&lt;/li&gt;&lt;li&gt;capability handshake&lt;/li&gt;&lt;li&gt;keyed BLAKE3 frame MAC&lt;/li&gt;&lt;li&gt;replay / PID / epoch binding&lt;/li&gt;&lt;/ul&gt;&lt;/div&gt;
      &lt;div class=&quot;stage&quot;&gt;&lt;b&gt;R2 · Matched hot path&lt;/b&gt;&lt;ul&gt;&lt;li&gt;prepared pre-send QPC boundary&lt;/li&gt;&lt;li&gt;event-driven receiver&lt;/li&gt;&lt;li&gt;destination handle cache&lt;/li&gt;&lt;li&gt;bounded admission/deadline&lt;/li&gt;&lt;li&gt;outbox + inbox + commit ACK&lt;/li&gt;&lt;/ul&gt;&lt;/div&gt;
      &lt;div class=&quot;stage r1&quot;&gt;&lt;b&gt;R1 · Initial POC&lt;/b&gt;&lt;ul&gt;&lt;li&gt;Windows named shared memory&lt;/li&gt;&lt;li&gt;directed SPSC request/response&lt;/li&gt;&lt;li&gt;CRC32C and named event&lt;/li&gt;&lt;li&gt;normal ModuleHost reducer path&lt;/li&gt;&lt;li&gt;historical asymmetric timer&lt;/li&gt;&lt;/ul&gt;&lt;/div&gt;
      &lt;div class=&quot;stage http&quot;&gt;&lt;b&gt;Persistent local HTTP&lt;/b&gt;&lt;ul&gt;&lt;li&gt;current R6 same-session reference&lt;/li&gt;&lt;li&gt;same v2 destination mutation&lt;/li&gt;&lt;li&gt;authenticated bearer identity&lt;/li&gt;&lt;li&gt;loopback TCP/HTTP stack&lt;/li&gt;&lt;li&gt;not a memBUS fallback&lt;/li&gt;&lt;/ul&gt;&lt;/div&gt;

&lt;script src=&quot;https://unpkg.com/@floating-ui/core@1.7.3/dist/floating-ui.core.umd.min.js&quot;&gt;&lt;/script&gt;
&lt;script src=&quot;https://unpkg.com/@floating-ui/dom@1.7.4/dist/floating-ui.dom.umd.min.js&quot;&gt;&lt;/script&gt;
&lt;script&gt;
(() =&gt; {
  if (window.FloatingUIDOM == null) {
    return;
  }
  const { autoUpdate, computePosition, flip, offset, shift, size } =
    window.FloatingUIDOM;
  const tooltipPlacements = new Set([&quot;top&quot;, &quot;right&quot;, &quot;bottom&quot;, &quot;left&quot;]);
  const tooltipId = `codex-visualization-tooltip-${
    window.crypto?.randomUUID?.() ?? Date.now().toString(36)
  }`;
  const tooltipGap = 5;
  const hoverDelay = 700;
  const skipDelay = 300;
  let activeTrigger = null;
  let pendingTrigger = null;
  let tooltip = null;
  let openTimeout = null;
  let autoUpdateCleanup = null;
  let positionRequest = 0;
  let skipDelayUntil = 0;

  const getTrigger = (target) =&gt;
    target?.nodeType === Node.ELEMENT_NODE
      ? target.closest(&quot;[data-tooltip]&quot;)
      : null;
  const containsTarget = (trigger, target) =&gt;
    target?.nodeType != null &amp;&amp; trigger.contains(target);
  const getContent = (trigger) =&gt;
    trigger.getAttribute(&quot;data-tooltip&quot;)?.trim() ?? &quot;&quot;;
  const getPlacement = (trigger) =&gt; {
    const placement = trigger.getAttribute(&quot;data-tooltip-placement&quot;);
    return tooltipPlacements.has(placement) ? placement : &quot;top&quot;;
  };
  const getTooltip = () =&gt; {
    if (tooltip == null) {
      tooltip = document.createElement(&quot;div&quot;);
      tooltip.id = tooltipId;
      tooltip.className = &quot;tooltip&quot;;
      tooltip.setAttribute(&quot;role&quot;, &quot;tooltip&quot;);
    }
    return tooltip;
  };
  const setDescribedBy = (trigger, described) =&gt; {
    const ids = new Set(
      (trigger.getAttribute(&quot;aria-describedby&quot;) ?? &quot;&quot;)
        .split(/\s+/)
        .filter(Boolean),
    );
    if (described) {
      ids.add(tooltipId);
    } else {
      ids.delete(tooltipId);
    }
    if (ids.size === 0) {
      trigger.removeAttribute(&quot;aria-describedby&quot;);
    } else {
      trigger.setAttribute(&quot;aria-describedby&quot;, [...ids].join(&quot; &quot;));
    }
  };
  const clearOpenTimeout = () =&gt; {
    if (openTimeout != null) {
      window.clearTimeout(openTimeout);
      openTimeout = null;
    }
    pendingTrigger = null;
  };
  const closeTooltip = (activateSkipDelay = true) =&gt; {
    clearOpenTimeout();
    positionRequest += 1;
    autoUpdateCleanup?.();
    autoUpdateCleanup = null;
    if (activeTrigger == null) {
      return;
    }
    setDescribedBy(activeTrigger, false);
    activeTrigger = null;
    tooltip?.remove();
    if (activateSkipDelay) {
      skipDelayUntil = Date.now() + skipDelay;
    }
  };
  const updatePosition = (trigger, floating) =&gt; {
    const request = ++positionRequest;
    void computePosition(trigger, floating, {
      middleware: [
        offset(tooltipGap),
        flip({ padding: tooltipGap }),
        shift({ padding: tooltipGap }),
        size({
          padding: tooltipGap,
          apply({ availableHeight, availableWidth, elements }) {
            elements.floating.style.setProperty(
              &quot;--tooltip-available-width&quot;,
              `${Math.max(0, availableWidth)}px`,
            );
            elements.floating.style.setProperty(
              &quot;--tooltip-available-height&quot;,
              `${Math.max(0, availableHeight)}px`,
            );
          },
        }),
      ],
      placement: getPlacement(trigger),
      strategy: &quot;fixed&quot;,
    })
      .then(({ x, y }) =&gt; {
        if (activeTrigger !== trigger || request !== positionRequest) {
          return;
        }
        const scale = window.devicePixelRatio || 1;
        floating.style.transform = `translate(${Math.round(x * scale) / scale}px, ${Math.round(y * scale) / scale}px)`;
        floating.style.visibility = &quot;visible&quot;;
      })
      .catch(() =&gt; {
        if (activeTrigger === trigger &amp;&amp; request === positionRequest) {
          closeTooltip(false);
        }
      });
  };
  const openTooltip = (trigger) =&gt; {
    const content = getContent(trigger);
    if (!trigger.isConnected || content.length === 0) {
      return;
    }
    clearOpenTimeout();
    if (activeTrigger === trigger) {
      return;
    }
    closeTooltip();
    const floating = getTooltip();
    floating.textContent = content;
    floating.style.visibility = &quot;hidden&quot;;
    floating.style.transform = &quot;translate(0, 0)&quot;;
    document.body.appendChild(floating);
    activeTrigger = trigger;
    setDescribedBy(trigger, true);
    autoUpdateCleanup = autoUpdate(trigger, floating, () =&gt; {
      updatePosition(trigger, floating);
    });
  };
  const requestOpen = (trigger, immediate = false) =&gt; {
    if (
      getContent(trigger).length === 0 ||
      activeTrigger === trigger ||
      pendingTrigger === trigger
    ) {
      return;
    }
    clearOpenTimeout();
    pendingTrigger = trigger;
    const delay =
      immediate || activeTrigger != null || Date.now() &lt; skipDelayUntil
        ? 0
        : hoverDelay;
    if (delay === 0) {
      openTooltip(trigger);
      return;
    }
    openTimeout = window.setTimeout(() =&gt; {
      openTimeout = null;
      pendingTrigger = null;
      openTooltip(trigger);
    }, delay);
  };
  const handlePointerOpen = (event) =&gt; {
    if (event.pointerType === &quot;touch&quot;) {
      return;
    }
    const trigger = getTrigger(event.target);
    if (trigger == null || containsTarget(trigger, event.relatedTarget)) {
      return;
    }
    requestOpen(trigger);
  };
  const handleLeave = (event) =&gt; {
    const trigger = getTrigger(event.target);
    if (trigger == null || containsTarget(trigger, event.relatedTarget)) {
      return;
    }
    if (activeTrigger === trigger || pendingTrigger === trigger) {
      closeTooltip();
    }
  };
  const handleFocusIn = (event) =&gt; {
    const trigger = getTrigger(event.target);
    if (trigger?.matches(&quot;:focus-visible&quot;)) {
      requestOpen(trigger, true);
    }
  };
  const handleKeyDown = (event) =&gt; {
    if (event.key === &quot;Escape&quot;) {
      closeTooltip();
    }
  };
  const handleContextMenu = (event) =&gt; {
    const trigger = getTrigger(event.target);
    if (activeTrigger === trigger || pendingTrigger === trigger) {
      closeTooltip();
    }
  };
  const destroy = () =&gt; {
    closeTooltip(false);
    document.removeEventListener(&quot;pointerover&quot;, handlePointerOpen);
    document.removeEventListener(&quot;pointerout&quot;, handleLeave);
    document.removeEventListener(&quot;focusin&quot;, handleFocusIn);
    document.removeEventListener(&quot;focusout&quot;, handleLeave);
    document.removeEventListener(&quot;keydown&quot;, handleKeyDown);
    document.removeEventListener(&quot;contextmenu&quot;, handleContextMenu);
    tooltip = null;
  };

  document.addEventListener(&quot;pointerover&quot;, handlePointerOpen);
  document.addEventListener(&quot;pointerout&quot;, handleLeave);
  document.addEventListener(&quot;focusin&quot;, handleFocusIn);
  document.addEventListener(&quot;focusout&quot;, handleLeave);
  document.addEventListener(&quot;keydown&quot;, handleKeyDown);
  document.addEventListener(&quot;contextmenu&quot;, handleContextMenu);
  window.addEventListener(&quot;pagehide&quot;, destroy, { once: true });
})();
&lt;/script&gt;

(() =&gt; {
  const initialize = () =&gt; {
    globalThis.lucide?.createIcons({ attrs: { width: 16, height: 16 } });
  };
  if (globalThis.lucide != null) {
    initialize();
    return;
  }
  document
    .getElementById(&quot;codex-visualization-lucide&quot;)
    ?.addEventListener(&quot;load&quot;, initialize, { once: true });
})();
&lt;/script&gt;
